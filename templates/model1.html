<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Model 1 — Real vs AI Video</title>
    <link rel="stylesheet" href="/static/CSS/style.css">
</head>

<body>

    <nav>
        <a href="/" class="back">← Back</a>
        <span class="logo">Model 01 — Real vs AI Video</span>
    </nav>

    <div class="model-page">

        <div class="upload-box" id="uploadBox">
            <input type="file" id="videoInput" accept="video/*" hidden>
            <div class="upload-icon">▶</div>
            <p>Click or drag video here</p>
            <span>MP4, AVI, MOV supported</span>
        </div>

        <div class="loading" id="loading" style="display:none">
            <div class="spinner"></div>
            <p>Analyzing video...</p>
        </div>

        <div class="result-box" id="resultBox" style="display:none">
            <div class="result-label" id="resultLabel"></div>
            <div class="prob-row">
                <span>Real</span>
                <div class="bar-track">
                    <div class="bar-fill real" id="realBar" style="width:0%"></div>
                </div>
                <span id="realPct">0%</span>
            </div>
            <div class="prob-row">
                <span>AI</span>
                <div class="bar-track">
                    <div class="bar-fill ai" id="aiBar" style="width:0%"></div>
                </div>
                <span id="aiPct">0%</span>
            </div>
            <div class="meta" id="metaInfo"></div>
            <button onclick="resetUI()" class="btn-reset">Test Another Video</button>
        </div>

    </div>

    <script src="/static/JS/model1.js"></script>
</body>

</html>
